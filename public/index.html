<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Futebol Bot Admin</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7f2;
        --panel: #ffffff;
        --ink: #18251d;
        --muted: #5d6b62;
        --line: #dce6df;
        --accent: #1f8a4c;
        --accent-dark: #176b3a;
        --warn: #b75519;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      header {
        padding: 24px clamp(16px, 4vw, 48px);
        background: #113d24;
        color: white;
      }

      header h1 {
        margin: 0 0 6px;
        font-size: clamp(24px, 4vw, 38px);
      }

      header p {
        margin: 0;
        color: #cfe4d6;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 24px auto 48px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .card,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .card {
        padding: 16px;
      }

      .label {
        color: var(--muted);
        font-size: 13px;
      }

      .value {
        margin-top: 8px;
        font-size: 30px;
        font-weight: 700;
      }

      .panel {
        margin-top: 18px;
        padding: 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        padding: 0 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #e7eee9;
        color: var(--ink);
      }

      button.warn {
        background: var(--warn);
      }

      button:hover {
        background: var(--accent-dark);
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        font: inherit;
      }

      textarea {
        min-height: 84px;
        resize: vertical;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1.4fr auto;
        gap: 10px;
        align-items: end;
      }

      .columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 13px;
      }

      .status {
        display: inline-block;
        border-radius: 999px;
        background: #e7eee9;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 700;
      }

      .topline {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 14px;
      }

      #toast {
        min-height: 20px;
        color: var(--muted);
        margin-top: 12px;
      }

      @media (max-width: 860px) {
        .grid,
        .columns,
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Futebol Bot</h1>
      <p>Painel administrativo da rodada semanal</p>
    </header>

    <main>
      <section class="grid">
        <div class="card">
          <div class="label">Total jogadores</div>
          <div class="value" id="totalJogadores">0</div>
        </div>
        <div class="card">
          <div class="label">Confirmados</div>
          <div class="value" id="confirmados">0</div>
        </div>
        <div class="card">
          <div class="label">Ausentes</div>
          <div class="value" id="ausentes">0</div>
        </div>
        <div class="card">
          <div class="label">Vagas restantes</div>
          <div class="value" id="vagas">0</div>
        </div>
      </section>

      <section class="panel">
        <div class="topline">
          <div>
            <strong id="rodada">Rodada</strong>
            <div class="label" id="aberto">Carregando...</div>
          </div>
          <div class="label" id="updated"></div>
        </div>
        <div style="margin: 0 0 14px">
          <input id="adminToken" placeholder="Token administrativo opcional" />
        </div>
        <div class="actions">
          <button data-action="/api/acao/nova-semana">Nova semana</button>
          <button data-action="/api/acao/convocacao">Convocar</button>
          <button data-action="/api/acao/fechar" class="warn">Fechar</button>
          <button data-action="/api/acao/abrir" class="secondary">Abrir</button>
          <button data-action="/api/acao/resumo" class="secondary">Enviar resumo</button>
        </div>
        <div id="toast"></div>
      </section>

      <section class="panel">
        <h2>Enviar mensagem</h2>
        <textarea id="mensagem" placeholder="Mensagem para o grupo"></textarea>
        <div style="margin-top: 10px">
          <button id="sendMessage">Enviar</button>
        </div>
      </section>

      <section class="panel">
        <h2>Adicionar mensalista</h2>
        <div class="form-row">
          <label>
            <span class="label">Telefone</span>
            <input id="telefone" placeholder="5511999999999" />
          </label>
          <label>
            <span class="label">Nome</span>
            <input id="nome" placeholder="Nome do jogador" />
          </label>
          <button id="addMensalista">Salvar</button>
        </div>
      </section>

      <section class="columns">
        <div class="panel">
          <h2>Mensalistas</h2>
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="mensalistas"></tbody>
          </table>
        </div>
        <div class="panel">
          <h2>Avulsos</h2>
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="avulsos"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      function toast(message) {
        $('toast').textContent = message;
      }

      async function request(path, options = {}) {
        const token = localStorage.getItem('futebolBotToken') || $('adminToken')?.value || '';
        if ($('adminToken') && $('adminToken').value) localStorage.setItem('futebolBotToken', $('adminToken').value);
        const response = await fetch(path, {
          headers: { 'Content-Type': 'application/json', ...(token ? { 'x-admin-token': token } : {}) },
          ...options
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      $('adminToken').value = localStorage.getItem('futebolBotToken') || '';

      function row(cells) {
        return `<tr>${cells.map((cell) => `<td>${cell}</td>`).join('')}</tr>`;
      }

      async function load() {
        const data = await request('/api/status');
        const resumo = data.resumo;
        $('totalJogadores').textContent = resumo.totalJogadores;
        $('confirmados').textContent = resumo.confirmados.length;
        $('ausentes').textContent = resumo.ausentes.length;
        $('vagas').textContent = resumo.vagasRestantes;
        let dataFormatada = data.rodada || '-';
        if (dataFormatada !== '-') {
          dataFormatada = dataFormatada.split('-').reverse().join('/');
        }
        $('rodada').textContent = `Rodada ${dataFormatada}`;
        $('aberto').textContent = data.aberto ? 'Confirmações abertas' : 'Confirmações fechadas';
        $('updated').textContent = new Date().toLocaleTimeString('pt-BR');

        $('mensalistas').innerHTML =
          data.mensalistas
            .map((jogador) =>
              row([
                jogador.nome,
                jogador.telefone,
                `<span class="status">${jogador.status || 'pendente'}</span>`,
                `<button class="secondary" data-remove="${jogador.telefone}">Remover</button>`
              ])
            )
            .join('') || row(['Nenhum mensalista', '', '', '']);

        $('avulsos').innerHTML =
          data.avulsos
            .map((jogador) =>
              row([jogador.nome, jogador.telefone, `<span class="status">${jogador.status}</span>`])
            )
            .join('') || row(['Nenhum avulso', '', '']);
      }

      document.querySelectorAll('[data-action]').forEach((button) => {
        button.addEventListener('click', async () => {
          try {
            await request(button.dataset.action, { method: 'POST', body: '{}' });
            toast('Ação executada.');
            await load();
          } catch (error) {
            toast(`Erro: ${error.message}`);
          }
        });
      });

      $('addMensalista').addEventListener('click', async () => {
        try {
          await request('/api/mensalista', {
            method: 'POST',
            body: JSON.stringify({ telefone: $('telefone').value, nome: $('nome').value })
          });
          $('telefone').value = '';
          $('nome').value = '';
          toast('Mensalista salvo.');
          await load();
        } catch (error) {
          toast(`Erro: ${error.message}`);
        }
      });

      $('sendMessage').addEventListener('click', async () => {
        try {
          await request('/api/acao/mensagem', {
            method: 'POST',
            body: JSON.stringify({ mensagem: $('mensagem').value })
          });
          $('mensagem').value = '';
          toast('Mensagem enviada.');
        } catch (error) {
          toast(`Erro: ${error.message}`);
        }
      });

      $('mensalistas').addEventListener('click', async (event) => {
        const telefone = event.target.dataset.remove;
        if (!telefone) return;
        await request(`/api/mensalista/${telefone}`, { method: 'DELETE' });
        toast('Mensalista removido.');
        await load();
      });

      load().catch((error) => toast(`Erro: ${error.message}`));
      setInterval(() => load().catch(() => {}), 10000);
    </script>
  </body>
</html>
